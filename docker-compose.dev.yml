# ===========================================
#  Docker Compose — Desenvolvimento
#  Sobe o banco e o backend com hot-reload.
#  O código é montado por volume, então
#  alterações refletem na hora, sem rebuild.
# ===========================================

services:
  # ---------- Banco de dados ----------
  database:
    image: postgres:16-alpine
    container_name: luizavideomaker_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-luizavideomaker}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Backend (API com hot-reload) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: luizavideomaker_api_dev
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-luizavideomaker}?schema=public
      JWT_SECRET: ${JWT_SECRET:-chave-de-desenvolvimento-nao-use-em-producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_URL: ${API_URL:-http://localhost:3333}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ADMIN_NAME: ${ADMIN_NAME:-Luiza}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-luiza@luizavideomaker.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-mudar-esta-senha}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_SIGNED_URL_EXPIRES: ${R2_SIGNED_URL_EXPIRES:-900}
    ports:
      - '3333:3333'
    volumes:
      # Monta o código para hot-reload, preservando node_modules do container
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data_dev:
