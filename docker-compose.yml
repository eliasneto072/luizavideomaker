# ===========================================
#  Docker Compose — Produção
#  Sobe o banco PostgreSQL e o backend já
#  compilado. As migrations são aplicadas
#  automaticamente na inicialização do backend.
# ===========================================

services:
  # ---------- Banco de dados ----------
  database:
    image: postgres:16-alpine
    container_name: luizavideomaker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Backend (API) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luizavideomaker_api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_URL: ${API_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_SIGNED_URL_EXPIRES: ${R2_SIGNED_URL_EXPIRES:-900}
    ports:
      - '3333:3333'

volumes:
  postgres_data:
